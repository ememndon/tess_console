name: tess-console

services:
  db:
    image: postgres:16
    container_name: tess-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    # Bound to loopback only — the database is never reachable from the internet.
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: ./app
    container_name: tess-app
    restart: unless-stopped
    environment:
      # In-network DB host is the compose service name, not loopback.
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      VAULT_MASTER_KEY: ${VAULT_MASTER_KEY}
      SESSION_SECRET: ${SESSION_SECRET}
      INTERNAL_SYNC_KEY: ${INTERNAL_SYNC_KEY}
      # Public origin (used to register the Telegram webhook). Update at
      # production promotion when the dev wall drops and the domain changes.
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-https://staging.tessconsole.cloud}
      MEDIA_ROOT: /app/media
      # Fabric.js thumbnail-render service (composes text over the AI scene).
      THUMB_URL: ${THUMB_URL:-http://thumb:7100}
      # GFPGAN face-restoration service (sharpens the face in the AI scene before
      # text is composited). FACE_RESTORE=1 turns it on; unset/0 = skip.
      FACE_URL: ${FACE_URL:-http://face:7200}
      FACE_RESTORE: ${FACE_RESTORE:-1}
      # Matte (background-removal) service — used by the cut-out composite style.
      MATTE_URL: ${MATTE_URL:-http://matte:7300}
    expose:
      - "3000"
    volumes:
      # Generated banners/videos + the Meta/LinkedIn manual-posting outbox.
      # Host bind mount so files persist across deploys and the owner can fetch them.
      - ./media:/app/media
    depends_on:
      db:
        condition: service_healthy

  # Demo Studio render worker. Drives the live sites with Playwright,
  # narrates with Piper, composes branded demo videos with ffmpeg. Heavy + isolated
  # so browser/encode load never touches the web app. Talks to the app over the
  # compose network via the INTERNAL_SYNC_KEY-guarded /api/internal/media/* routes.
  media:
    build: ./media-worker
    container_name: tess-media
    restart: unless-stopped
    environment:
      APP_URL: http://app:3000
      INTERNAL_SYNC_KEY: ${INTERNAL_SYNC_KEY}
      MEDIA_ROOT: /app/media
      PIPER_VOICE: ${PIPER_VOICE:-/opt/piper-voices/en_US-lessac-high.onnx}
      # Long multi-section showcase renders can exceed the default 60-min job cap
      # during compose; give them room so a 45-scene section can't die at the ceiling.
      JOB_TIMEOUT_MS: ${JOB_TIMEOUT_MS:-9000000}
    volumes:
      # Same bind mount as the app — the worker writes finished media here and the
      # app serves it via /api/media.
      - ./media:/app/media
    depends_on:
      app:
        condition: service_started
    # Resource guardrails so a render can never starve the web server (box has 4 cpu / 15 GB).
    mem_limit: 4g
    cpus: 3.0
    shm_size: 1gb

  # Thumbnail-render service. Composes the finished YouTube thumbnail with
  # Fabric.js (text + graphic accents over the AI scene). Debian base so
  # node-canvas uses prebuilt binaries (Alpine/musl would compile from source and
  # is fragile). Reachable only on the compose network; shares the media volume
  # (reads the AI scene, writes the final JPG) and the app's fonts (read-only).
  thumb:
    build: ./thumb-worker
    container_name: tess-thumb
    restart: unless-stopped
    environment:
      INTERNAL_SYNC_KEY: ${INTERNAL_SYNC_KEY}
      FONT_DIR: /fonts
    expose:
      - "7100"
    volumes:
      - ./media:/app/media
      - ./app/data/fonts:/fonts:ro
    mem_limit: 1g
    cpus: 1.5

  # Face-restoration service (Tier 4). GFPGAN sharpens the face in the AI scene
  # before the thumbnail text is composited. Heavy Python/PyTorch stack, isolated
  # like the media/thumb workers; CPU-only. Best-effort from the app's side, so the
  # web tier never hard-depends on it. Shares the media volume (reads/writes scenes).
  face:
    build: ./face-worker
    container_name: tess-face
    restart: unless-stopped
    environment:
      INTERNAL_SYNC_KEY: ${INTERNAL_SYNC_KEY}
    expose:
      - "7200"
    volumes:
      - ./media:/app/media
    mem_limit: 4g
    cpus: 2.0

  # Matte / background-removal service (rembg). Cuts the subject out to a
  # transparent PNG for the cut-out composite thumbnail style. Isolated, CPU-only.
  matte:
    build: ./matte-worker
    container_name: tess-matte
    restart: unless-stopped
    environment:
      INTERNAL_SYNC_KEY: ${INTERNAL_SYNC_KEY}
    expose:
      - "7300"
    volumes:
      - ./media:/app/media
    mem_limit: 3g
    cpus: 2.0

  caddy:
    image: caddy:2
    container_name: tess-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      # No UDP/443: HTTP/3 is disabled in the Caddyfile. Publishing udp/443 made
      # docker-proxy swallow stray QUIC packets (from browsers with a cached h3
      # alt-svc) into a black hole, so Chrome/Brave never fell back to TCP and
      # hung with ERR_TOO_MANY_RETRIES. Without it, QUIC is refused → instant
      # fallback to HTTP/2.
    volumes:
      # Directory mount (not single-file) so config edits propagate into the container.
      - ./caddy:/etc/caddy:ro
      - ./caddy/site:/srv:ro
      - caddy_data:/data
      - caddy_config:/config
    # `default` = this project's own network (app/db/workers live here, unchanged).
    # `edge` = a shared external proxy network so Caddy can reach OTHER isolated
    # compose projects (e.g. the career portal's tessportal-web) by name. Only the
    # Caddy service joins edge; nothing else in this stack does.
    networks:
      - default
      - edge

volumes:
  pgdata:
  caddy_data:
  caddy_config:

networks:
  edge:
    external: true
